name: Test_Change
on:
  pull_request
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - id: file_changes
        uses: trilom/file-changes-action@ce38c8ce2459ca3c303415eec8cb0409857b4272
        with:
          output: 'json'
          fileOutput: 'json'

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Record PR number
        run: |
          mkdir -p pr-comments
          echo "${{ github.event.number }}" > pr-comments/pr-number.txt

      - name: Run adapter audit unit tests
        run: node --test utils/adapterAudit.test.js

      - name: Run adapter audit digest
        env:
          LLAMA_DEBUG_MODE: "true"
          FILES_MODIFIED: ${{ steps.file_changes.outputs.files_modified }}
          FILES_ADDED: ${{ steps.file_changes.outputs.files_added }}
          FILES_REMOVED: ${{ steps.file_changes.outputs.files_removed }}
        run: |
          PACKAGE_FILES_CHANGED=$(node -e "
            const restricted = new Set(['package.json', 'package-lock.json', 'pnpm-lock.yaml', 'pnpm-workspace.yaml'])
            const parseFiles = (value) => {
              if (!value) return []
              const parsed = JSON.parse(value)
              if (!Array.isArray(parsed)) throw new Error('file-changes output must be a JSON array')
              return parsed
            }
            const files = [
              ...parseFiles(process.env.FILES_MODIFIED),
              ...parseFiles(process.env.FILES_ADDED),
              ...parseFiles(process.env.FILES_REMOVED),
            ]
            console.log(files.some((file) => restricted.has(file)) ? 'true' : 'false')
          ")
          if [ "$PACKAGE_FILES_CHANGED" = "true" ]; then
            echo "------ ERROR ------ > Please revert changes to package.json / package-lock.json / pnpm-lock.yaml / pnpm-workspace.yaml" > ${{ github.workspace }}/pr-comments/adapter-audit.md
            exit 1
          fi

          if ! node ${{ github.workspace }}/utils/auditChangedAdapters.js \
            --base ${{ github.event.pull_request.base.sha }} \
            --markdown ${{ github.workspace }}/pr-comments/adapter-audit.md \
            --json ${{ github.workspace }}/pr-comments/adapter-audit.json \
            --compare-base; then
            if [ ! -s "${{ github.workspace }}/pr-comments/adapter-audit.md" ]; then
              echo "Adapter audit digest failed before report generation. See the workflow logs for details." > ${{ github.workspace }}/pr-comments/adapter-audit.md
            fi
            exit 1
          fi

      - name: Upload PR comments artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-comments
          path: pr-comments/
          if-no-files-found: ignore
          retention-days: 1

      - name: Run ESLint
        run: |
          npm run lint
