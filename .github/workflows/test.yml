name: Test_Change
on:
  pull_request
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - id: file_changes
        uses: trilom/file-changes-action@ce38c8ce2459ca3c303415eec8cb0409857b4272
        with:
          output: 'json'
          fileOutput: 'json'

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Record PR number
        run: |
          mkdir -p pr-comments
          echo "${{ github.event.number }}" > pr-comments/pr-number.txt

      - name: Run changes files through test script
        env:
          LLAMA_DEBUG_MODE: "true"
        run: |
          RUN_FILES=$(
            MODIFIED=${{ steps.file_changes.outputs.files_modified}} \
            ADDED=${{ steps.file_changes.outputs.files_added}} \
            node ${{ github.workspace }}/.github/workflows/getFileList.js
          )

          if [ "$RUN_FILES" = "[]" ]; then
            echo "No adapter files were modified"
            exit 0
          fi

          # pnpm remove typescript @types/async-retry @types/bn.js ts-node @solendprotocol/solend-sdk @hover-labs/kolibri-js

          # fail if package.json or package-lock.json is changed
          FILES_MODIFIED=${{ steps.file_changes.outputs.files_modified }}
          if [[ $FILES_MODIFIED == *"package.json"* || $FILES_MODIFIED == *"package-lock.json"* || $FILES_MODIFIED == *"pnpm-lock.yaml"* || $FILES_MODIFIED == *"pnpm-workspace.yaml"* ]]; then
            echo "------ ERROR ------ > Please revert changes to package.json / package-lock.json / pnpm-lock.yaml / pnpm-workspace.yaml" > ${{ github.workspace }}/output.txt
            node ${{ github.workspace }}/.github/workflows/commentResult.js ${{ github.workspace }}/output.txt ${{ github.workspace }}/pr-comments
            exit 1
          fi

          # fail if any newly-added lines use api.getLogs(...) — adapters must use the getLogs2 helper instead
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          OFFENDERS=$(git diff "$BASE_SHA" "$HEAD_SHA" -- 'projects/**/*.js' \
            | grep -nE '^\+[^+].*\bapi\.getLogs\s*\(' || true)
          if [ -n "$OFFENDERS" ]; then
            {
              echo "------ ERROR ------ > Use the getLogs2 helper (require('./helper/cache/getLogs').getLogs2) instead of api.getLogs(...). Found new usage in this PR:"
              echo "$OFFENDERS"
            } > ${{ github.workspace }}/output.txt
            node ${{ github.workspace }}/.github/workflows/commentResult.js ${{ github.workspace }}/output.txt ${{ github.workspace }}/pr-comments
            exit 1
          fi

          for i in $(echo $RUN_FILES | tr  -d '"[]' | tr "," "\n")
          do
            {
              node ${{ github.workspace }}/test.js ${{ github.workspace }}/${i} 2>&1 | tee output.txt
              node ${{ github.workspace }}/.github/workflows/commentResult.js ${{ github.workspace }}/output.txt ${{ github.workspace }}/pr-comments ${i}
              if grep -q "\-\-\-\- ERROR \-\-\-\-" output.txt; then
                exit 1;
              fi
            } || {
              echo -n $i
              echo ' doesnt run'
            }
          done

      - name: Upload PR comments artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-comments
          path: pr-comments/
          if-no-files-found: ignore
          retention-days: 1

      - name: Run ESLint
        run: |
          npm run lint
