name: Test_Change
on:
  pull_request
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - id: file_changes
        uses: trilom/file-changes-action@ce38c8ce2459ca3c303415eec8cb0409857b4272
        with:
          output: 'json'
          fileOutput: 'json'

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Restore TVL baselines
        uses: actions/cache/restore@v4
        continue-on-error: true
        with:
          path: .tvl-baselines
          key: tvl-baselines-v1-none
          restore-keys: |
            tvl-baselines-v1-

      - name: Record PR number
        run: |
          mkdir -p pr-comments
          echo "${{ github.event.number }}" > pr-comments/pr-number.txt

      - name: Run changes files through test script
        env:
          LLAMA_DEBUG_MODE: "true"
        run: |
          RUN_FILES=$(
            MODIFIED=${{ steps.file_changes.outputs.files_modified}} \
            ADDED=${{ steps.file_changes.outputs.files_added}} \
            node ${{ github.workspace }}/.github/workflows/getFileList.js
          )

          if [ "$RUN_FILES" = "[]" ]; then
            echo "No adapter files were modified"
            exit 0
          fi

          # pnpm remove typescript @types/async-retry @types/bn.js ts-node @solendprotocol/solend-sdk @hover-labs/kolibri-js

          # fail if package.json or package-lock.json is changed
          FILES_MODIFIED=${{ steps.file_changes.outputs.files_modified }}
          if [[ $FILES_MODIFIED == *"package.json"* || $FILES_MODIFIED == *"package-lock.json"* || $FILES_MODIFIED == *"pnpm-lock.yaml"* || $FILES_MODIFIED == *"pnpm-workspace.yaml"* ]]; then
            echo "------ ERROR ------ > Please revert changes to package.json / package-lock.json / pnpm-lock.yaml / pnpm-workspace.yaml" > ${{ github.workspace }}/output.txt
            node ${{ github.workspace }}/.github/workflows/commentResult.js ${{ github.workspace }}/output.txt ${{ github.workspace }}/pr-comments
            exit 1
          fi

          for i in $(echo $RUN_FILES | tr  -d '"[]' | tr "," "\n")
          do
            {
              node ${{ github.workspace }}/test.js ${{ github.workspace }}/${i} 2>&1 | tee output.txt

              # Look for a baseline JSON for this adapter, only if it's a real
              # file path (skip registry-derived virtual entries) and a cached
              # baseline exists. Any failure here is non-fatal — we fall back
              # to today's behavior by passing no baseline arg.
              BASELINE_JSON=""
              CURRENT_JSON=""
              if [ -f "${{ github.workspace }}/${i}" ]; then
                HASH=$(printf '%s' "${i}" | sha256sum | cut -c1-16)
                CANDIDATE="${{ github.workspace }}/.tvl-baselines/${HASH}.json"
                if [ -f "$CANDIDATE" ]; then
                  CURRENT_JSON="${{ github.workspace }}/current-${HASH}.json"
                  if node ${{ github.workspace }}/.github/workflows/parseTvl.js output.txt "$CURRENT_JSON"; then
                    BASELINE_JSON="$CANDIDATE"
                  else
                    CURRENT_JSON=""
                  fi
                fi
              fi

              node ${{ github.workspace }}/.github/workflows/commentResult.js ${{ github.workspace }}/output.txt ${{ github.workspace }}/pr-comments ${i} "$BASELINE_JSON" "$CURRENT_JSON"

              if grep -q "\-\-\-\- ERROR \-\-\-\-" output.txt; then
                exit 1;
              fi
            } || {
              echo -n $i
              echo ' doesnt run'
            }
          done

      - name: Upload PR comments artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-comments
          path: pr-comments/
          if-no-files-found: ignore
          retention-days: 1

      - name: Run ESLint
        run: |
          npm run lint
